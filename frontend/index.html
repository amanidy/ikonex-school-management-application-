<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elimu Bora — Student Management Application</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div class="app">
    
    <aside class="sidebar">
      <div class="brand">
        <span class="icon">🎓</span>
        <div>
          <div class="title">Elimu Bora Academy</div>
          <div class="version"> v1.0</div>
        </div>
      </div>
      <nav class="nav">
        <button class="item active" data-section="dashboard">
          Dashboard
        </button>
        <button class="item" data-section="streams">
          Class Streams
        </button>
        <button class="item" data-section="students">
          Students
        </button>
        <button class="item" data-section="subjects">
          Subjects
        </button>
        <button class="item" data-section="scores">
          Scores
        </button>
        <button class="item" data-section="results">
          Results
        </button>
        <button class="item" data-section="reports">
          Reports
        </button>
      </nav>
    </aside>

    
    <main class="main">
      <div id="dashboard" class="section active"></div>
      <div id="streams" class="section"></div>
      <div id="students" class="section"></div>
      <div id="subjects" class="section"></div>
      <div id="scores" class="section"></div>
      <div id="results" class="section"></div>
      <div id="reports" class="section"></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/streams.js"></script>
  <script type="module" src="js/students.js"></script>
  <script type="module" src="js/subjects.js"></script>
  <script type="module" src="js/scores.js"></script>
  <script type="module" src="js/results.js"></script>
  <script type="module" src="js/reports.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
